[mypy]
strict = True
# The example copies ducktail.py in (as a real investigation does), so its `ducktail`
# module must be the only one in this run -- hence a separate config, rooted here, not
# folded into ducktail/mypy.ini (which would see two modules named `ducktail`).
mypy_path = .
explicit_package_bases = True
files = ducktail.py, refresh.py, sources, dash.py
