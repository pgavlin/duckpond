[mypy]
strict = True
# ducktail is a project template, not an installable package: refresh.py and
# sources/example_hourly.py do `from ducktail import ...` and `from sources... import ...`,
# resolving to template/ducktail.py and template/sources/ next to them. Put template/ on
# the path so those imports resolve, and check the files as modules rooted there so mypy
# doesn't also discover ducktail.py by walking the tree (which would be a duplicate module).
mypy_path = skills/ducktail/assets/template
explicit_package_bases = True
files = skills/ducktail/assets/template, skills/ducktail/references/refresh.py
